# ============================================================================
# Central configuration. Every script reads from here so that an experiment is
# fully described by this file + the script you ran. Change a number here, not
# in the middle of your code.
# ============================================================================

seed: 42                       # fixes randomness so runs are reproducible

model:
  # Start small. You can swap to Qwen-2.5 by changing this one line.
  # name: "microsoft/phi-2"
  name: "meta-llama/Llama-2-7b-chat-hf"
  # name: "Qwen/Qwen2.5-1.5B"
  load_in_4bit: false          # set true if the model doesn't fit in GPU memory
  dtype: "bfloat16"            # fp32-full-model OOMs on 80GB; bf16 fits. (True fp32
                               # master weights need optimizer CPU-offload via FSDP/
                               # DeepSpeed - deferred until we confirm it's needed.)
  max_seq_length: 512

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  counterfactual_dir: "data/counterfactuals"
  # How many examples to evaluate on. Use a small number while debugging,
  # then raise it for the real runs.
  eval_subset_size: 500

evaluation:
  batch_size: 8
  max_new_tokens: 200          # generous cap like the repo; the model stops at EOS.
                               # (20 was truncating answers -> depressed eval ROUGE)
  # We'll compute several metrics; see src/evaluation/metrics.py
  metrics: ["exact_match", "token_f1"]

training:
  output_dir: "experiments"
  # Shared hyperparameters across methods. Method-specific ones live in their
  # own sub-block below so a comparison only changes what it needs to.
  epochs: 3
  learning_rate: 2.0e-4
  per_device_batch_size: 1
  gradient_accumulation_steps: 32  # 1 x 32 = effective batch 32 (TOFU App. B);
                                   # micro-batch 1 keeps unlearn (esp. KL's oracle) under 80GB


  warmup_ratio: 0.2
  logging_steps: 10
  save_steps: 200
  weight_decay: 0.01 

  lora:
    r: 16                      # rank of the low-rank update
    alpha: 32                  # scaling
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

  self_distillation:
    temperature: 2.0           # softens teacher logits (Hinton distillation)
    alpha: 1.0                 # weight on the RETAIN term (distil toward the RAW teacher).
                               # Raised 0.5->1.0 historically: at 0.5 retain collapsed.
    forget_alpha: 1.0          # weight on the FORGET term. Replaces the old unbounded
                               # gradient-ascent forget loss (which drove forget prob->0 and
                               # exploded the truth ratio -> Forget-Quality ~ -1e2). Now we
                               # distil toward the teacher with the memorized answer SUPPRESSED
                               # -> a valid softmax target -> bounded forgetting, utility kept.
    forget_margin: 20.0        # logit penalty on the memorized next-token over the forget
                               # answer span (exp(-20) ~ 2e-9 -> near-total suppression, mass
                               # redistributed to the teacher's other fluent tokens). Drop to
                               # 5-10 for softer/partial forgetting.

  grpo:
    num_generations: 4         # samples per prompt used to estimate advantage
    kl_beta: 0.10               # KL leash — GRPO's ONLY retain protection (no retain
                               # batch). Empirical bisection on forget10:
                               #   0.04 -> global COLLAPSE (ROUGE 0 on every split)
                               #   0.06 -> retain collapsed to 0.22 AND forget stuck
                               #          at 0.17 (loose leash, worst of both)
                               #   0.2  -> retain preserved but UNDER-forgets
                               #          (forget ROUGE plateaus ~0.48, prob/truth flat)
                               #   0.1  -> midpoint (CURRENT): tighter leash to protect
                               #          retain. Nudge UP if retain still collapses,
                               #          DOWN if forget won't drop. GRPO can't separate
                               #          forget vs retain authors -> expect a ceiling.
    learning_rate: 5.0e-6      # GRPO-only LR, gentler than the shared unlearn_lr
                               # (1e-5): RL updates are noisier, and too-high LR tips
                               # the policy into the collapse above.
    max_completion_length: 64
    temperature: 1.0           # sampling temperature for the generated completions

# ============================================================================
# TOFU-specific settings (the fictitious-author unlearning benchmark).
# ============================================================================
tofu:
  cache_dir: "data/raw/tofu"   # where the HF download is cached
  forget_level: "forget10"     # forget01 | forget05 | forget10 (pairs with retain90 reference)
  eval_limit: null             # null = all questions; set e.g. 50 for a smoke test

  # LEARN phase (fine-tune base model on TOFU).
  finetune_epochs: 5
  finetune_lr: 1.0e-5          # TOFU's value

  # UNLEARN phase.
  unlearn_epochs: 5
  unlearn_lr: 5.0e-6           # Full-FT + self-distill (shared, full-parameter). Lowered
                               # 1e-5->5e-6: at 1e-5 Full-FT over-suppressed (forget prob->0.000,
                               # Forget-Quality -166). Gentler steps keep the forget distribution
                               # near the never-trained reference instead of collapsing past it.
  unlearn_lr_lora: 1.0e-4      # LoRA adapters need ~10x higher LR than full FT (at 1e-5 they
                               # barely move -> no forgetting). Tried 5e-5 to buy back utility but
                               # it killed forgetting ENTIRELY (forget ROUGE 0.978->0.942, flat) ->
                               # reverted to 1e-4. LR is the wrong lever here: lowering it just
                               # under-forgets. For more utility raise CAPACITY (rank/target) instead.
  # loss method is passed on the command line: only gradient_difference remains
  # (gradient_ascent / kl_minimization / idk were removed).

  # TOFU Figure 8 — track metrics DURING unlearning (dynamics vs step). Off by
  # default; enable per-run with `--track-curve` (or set true here). Reproduces
  # the paper's forget05 + gradient_difference figure. Small subset keeps the
  # in-training eval cheap; raise curve_max_new_tokens for longer answers.
  track_curve: false
  curve_eval_steps: 8          # eval every N optimizer steps (forget10 ~65 steps -> ~9 points)
  curve_subset: 100            # records/split for the in-training curve eval. Was `null` (full
                               # 1017 records), but full-split ROUGE generation (one question at
                               # a time, every 8 steps) blew past the 12h SLURM wall (~78 min PER
                               # eval point). 100/split -> ~400 records total (forget/retain
                               # 400->100), ~2.5x fewer -> ~5h/job, safe under 12h. The per-record
                               # min(R,1/R) fold already stops outliers hijacking the mean, so 100
                               # is visually identical to full. Drop to 50 for more margin.
                               # (The FINAL full-split eval lives in 03_evaluate.)
  curve_max_new_tokens: 200    # match the paper's / main-eval generation length so the curve's
                               # ROUGE isn't truncated (60 was clipping longer gold answers).

# ============================================================================
# Spectral trace detectability (recovery axis 3; Chen et al. ICLR 2026).
# Pure inference on existing checkpoints — see scripts/recovery/spectral.py.
# ============================================================================
spectral:
  # Hidden-state layers to fingerprint (index into output_hidden_states:
  # 0 = embeddings, 1..32 = after each block; 32 = final pre-logit layer for
  # Llama-2-7B). Paper finds traces strongest in intermediate + final layers.
  layers: [7, 15, 24, 32]
  n_prompts: 300               # forget-irrelevant prompts sampled for activations
  max_new_tokens: 64           # response length generated per prompt
  top_k: 5                     # top singular directions checked for the shift
